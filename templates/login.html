{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sign In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{% static 'admin/dashboard.css' %}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--dash-bg-page,#f1f5f9); }
    .login-card { background:var(--dash-card,#fff); border:1px solid var(--dash-border,#e2e8f0); border-radius:12px; padding:40px 36px; width:100%; max-width:380px; box-shadow:0 4px 24px rgba(0,0,0,.08); }
    .login-title { font-size:20px; font-weight:700; color:var(--dash-text,#0f172a); margin:0 0 6px; }
    .login-sub { font-size:13px; color:var(--dash-muted,#64748b); margin:0 0 28px; }
    .login-label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--dash-muted); margin-bottom:5px; }
    .login-input { width:100%; padding:9px 12px; border:1px solid var(--dash-border,#e2e8f0); border-radius:7px; font-size:14px; background:var(--dash-bg,#fff); color:var(--dash-text); box-sizing:border-box; }
    .login-input:focus { outline:none; border-color:var(--dash-primary,#4f46e5); box-shadow:0 0 0 3px rgba(79,70,229,.12); }
    .login-btn { width:100%; padding:10px; background:var(--dash-primary,#4f46e5); color:#fff; border:none; border-radius:7px; font-size:14px; font-weight:600; cursor:pointer; margin-top:20px; }
    .login-btn:hover { opacity:.92; }
    .login-error { background:#fef2f2; border:1px solid #fca5a5; color:#991b1b; border-radius:7px; padding:10px 14px; font-size:13px; margin-bottom:16px; }
    .login-field { margin-bottom:16px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-title">Student Enrollment Portal</div>
    <div class="login-sub">Sign in to continue</div>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

      <div class="login-field">
        <label class="login-label" for="id_username">Username</label>
        <input class="login-input" type="text" id="id_username" name="username"
               autofocus autocomplete="username" required>
      </div>

      <div class="login-field">
        <label class="login-label" for="id_password">Password</label>
        <input class="login-input" type="password" id="id_password" name="password"
               autocomplete="current-password" required>
      </div>

      <button type="submit" class="login-btn">Sign in</button>
    </form>
  </div>
</body>
</html>
