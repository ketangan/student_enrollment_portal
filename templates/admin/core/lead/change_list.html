{% extends "admin/change_list.html" %}
{% load i18n %}

{% block extrastyle %}
{{ block.super }}
<style>
  /* "0 results (1 total)" — remove Bootstrap small + Jazzmin quiet shrinkage so
     it matches the "0 of 0 selected" action-counter text */
  #changelist-search .small { font-size: 1rem; font-weight: 400; }

  /* list-editable Save button — remove btn-sm so it matches the Search button */
  .dataTables_info input[name="_save"] {
    padding: .375rem .75rem;
    font-size: 1rem;
    line-height: 1.5;
    vertical-align: middle;
  }
  /* Align count text and Save button vertically inside dataTables_info */
  .dataTables_info { display: flex; align-items: center; gap: 8px; }
  /* Space between Search button and "0 results (1 total)" */
  #search_group { display: flex; align-items: center; gap: 8px; }

  /* Quick-add panel */
  #qa-panel { margin-top: 12px; }
  #qa-panel .card-body label {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 3px;
    color: inherit;
  }
</style>
{% endblock %}

{% block content %}
{% if not request.user.is_superuser %}
<div class="col-12 pb-2">
  <button
    id="qa-toggle"
    type="button"
    class="btn btn-primary"
    style="background-color:#2563eb;border-color:#1d4ed8;"
    onclick="(function(){var p=document.getElementById('qa-panel');p.style.display=p.style.display==='none'?'block':'none';})();">
    + Add Lead
  </button>

  <div id="qa-panel" style="display:none;">
    <div class="card mt-2">
      <div class="card-body">
        <form method="post" action="{% url 'admin:core_lead_quick_add' %}">
          {% csrf_token %}
          <div class="form-row">
            <div class="col-md-4 mb-2">
              <label>Name <span class="text-danger">*</span></label>
              <input type="text" name="name" required autocomplete="off" class="form-control form-control-sm">
            </div>
            <div class="col-md-4 mb-2">
              <label>Email <span class="text-danger">*</span></label>
              <input type="email" name="email" required autocomplete="off" class="form-control form-control-sm">
            </div>
            <div class="col-md-4 mb-2">
              <label>Phone</label>
              <input type="tel" name="phone" autocomplete="off" class="form-control form-control-sm">
            </div>
            <div class="col-md-4 mb-2">
              <label>Interested In</label>
              <input type="text" name="interested_in_label" placeholder="e.g. Ballet, Hip-Hop" autocomplete="off" class="form-control form-control-sm">
            </div>
            <div class="col-md-4 mb-2">
              <label>Source <span class="text-danger">*</span></label>
              <select name="source" required class="form-control form-control-sm">
                <option value="">— Select source —</option>
                <option value="website">Website</option>
                <option value="referral">Referral</option>
                <option value="social">Social Media</option>
                <option value="walk_in">Walk-in</option>
                <option value="phone">Phone</option>
                <option value="event">Event</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>
          <div class="form-group mb-3">
            <label>Notes</label>
            <textarea name="notes" rows="2" placeholder="Call notes, questions asked, etc." class="form-control form-control-sm"></textarea>
          </div>
          <div class="d-flex gap-2 align-items-center" style="gap:8px;">
            <button type="submit" class="btn btn-success btn-sm">Save Lead</button>
            <button type="button" class="btn btn-secondary btn-sm"
              onclick="document.getElementById('qa-panel').style.display='none';">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endif %}
{{ block.super }}
{% endblock %}
