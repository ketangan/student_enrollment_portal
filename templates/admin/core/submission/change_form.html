{% extends "admin/change_form.html" %}

{% block object-tools-items %}
  {% if ai_summary_enabled and original %}
  <li>
    <form method="post" action="{% url 'admin:core_submission_generate_summary' original.pk %}" style="margin:0;">
      {% csrf_token %}
      <button
        type="submit"
        class="historylink"
        {% if original.ai_summary %}onclick="return confirm('This will replace the existing summary. Continue?')"{% endif %}
      >
        {% if original.ai_summary %}Regenerate AI Summary{% else %}Generate AI Summary{% endif %}
      </button>
    </form>
  </li>
  {% endif %}
  {{ block.super }}
{% endblock %}
