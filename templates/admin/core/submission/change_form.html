{% extends "admin/change_form.html" %}

{% block object-tools-items %}
  {% if ai_summary_enabled and original %}
  <li>
    <a
      href="#"
      class="historylink"
      id="ai-summary-btn"
      data-url="{% url 'admin:core_submission_generate_summary' original.pk %}"
      data-has-summary="{% if original.ai_summary %}true{% else %}false{% endif %}"
    >
      {% if original.ai_summary %}Regenerate AI Summary{% else %}Generate AI Summary{% endif %}
    </a>
  </li>
  <script>
  (function () {
    var btn = document.getElementById("ai-summary-btn");
    if (!btn) return;
    btn.addEventListener("click", function (e) {
      e.preventDefault();
      if (btn.getAttribute("data-has-summary") === "true") {
        if (!confirm("This will replace the existing summary. Continue?")) return;
      }
      // Grab CSRF token from the existing admin form on the page
      var csrfInput = document.querySelector("[name=csrfmiddlewaretoken]");
      var csrf = csrfInput ? csrfInput.value : "";
      // Build a fresh form outside the existing form to avoid nested-form issues
      var form = document.createElement("form");
      form.method = "POST";
      form.action = btn.getAttribute("data-url");
      var hidden = document.createElement("input");
      hidden.type = "hidden";
      hidden.name = "csrfmiddlewaretoken";
      hidden.value = csrf;
      form.appendChild(hidden);
      document.body.appendChild(form);
      form.submit();
    });
  })();
  </script>
  {% endif %}
  {{ block.super }}
{% endblock %}
