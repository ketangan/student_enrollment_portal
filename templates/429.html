<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Too Many Requests</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8fafc;
        color: #1e293b;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
        box-sizing: border-box;
      }
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 48px 40px;
        max-width: 440px;
        width: 100%;
        text-align: center;
      }
      .icon { font-size: 2.5rem; margin-bottom: 16px; }
      h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 12px; }
      p { font-size: 0.95rem; color: #64748b; line-height: 1.6; margin: 0 0 24px; }
      .btn {
        display: inline-block;
        padding: 10px 24px;
        background: #2563eb;
        color: #fff;
        border-radius: 8px;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">⏱️</div>
      <h1>Too many requests</h1>
      <p>
        We received too many submissions from your connection in a short time.
        Please wait a moment and try again.
      </p>
      <a href="javascript:history.back()" class="btn">Go back</a>
    </div>
  </body>
</html>
