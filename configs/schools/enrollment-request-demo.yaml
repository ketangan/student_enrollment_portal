school:
  slug: "enrollment-request-demo"
  display_name: "Riverside Learning Academy"
  website_url: ""
  source_url: ""

form:
  title: "Enrollment Application"
  description: >
    Complete this form to begin the enrollment process.
    We’ll review your application and follow up with next steps within 1–2 business days.

  sections:
    - title: "Student Information"
      fields:
        - key: student_first_name
          label: "Student First Name"
          type: text
          required: true

        - key: student_last_name
          label: "Student Last Name"
          type: text
          required: true

        - key: date_of_birth
          label: "Date of Birth"
          type: date
          required: false

        - key: age
          label: "Age"
          type: number
          required: false
          readonly: true

    - title: "Program Interest"
      fields:
        - key: interested_in
          label: "Program / Class of Interest"
          type: select
          required: true

        - key: enrollment_type
          label: "Enrollment Type"
          type: select
          required: true
          options:
            - label: "Enroll now"
              value: enroll_now
            - label: "Request trial / evaluation"
              value: trial
            - label: "Returning student"
              value: returning

        - key: desired_start_date
          label: "Desired Start Date"
          type: select
          required: false
          options:
            - label: "As soon as possible"
              value: asap
            - label: "Within the next 2 weeks"
              value: two_weeks
            - label: "Within the next month"
              value: one_month
            - label: "Not sure yet"
              value: unsure

    - title: "Schedule Preferences"
      fields:
        - key: preferred_days
          label: "Preferred Days"
          type: multiselect
          required: false
          options:
            - label: "Monday"
              value: mon
            - label: "Tuesday"
              value: tue
            - label: "Wednesday"
              value: wed
            - label: "Thursday"
              value: thu
            - label: "Friday"
              value: fri
            - label: "Saturday"
              value: sat
            - label: "Sunday"
              value: sun

        - key: preferred_time
          label: "Preferred Time of Day"
          type: select
          required: false
          options:
            - label: "Morning"
              value: morning
            - label: "Afternoon"
              value: afternoon
            - label: "Evening"
              value: evening
            - label: "Flexible"
              value: flexible

    - title: "Parent / Guardian Information (if applicable)"
      fields:
        - key: guardian_name
          label: "Parent / Guardian Full Name"
          type: text
          required: false

        - key: guardian_email
          label: "Parent / Guardian Email"
          type: email
          required: false

        - key: guardian_phone
          label: "Parent / Guardian Phone Number"
          type: tel
          required: false

    - title: "Contact Information"
      fields:
        - key: contact_email
          label: "Primary Email Address"
          type: email
          required: true

        - key: contact_phone
          label: "Primary Phone Number"
          type: tel
          required: false

    - title: "File Uploads"
      fields:
        - key: id_document
          label: "ID Document"
          type: file
          required: false
          accept: ".pdf,.jpg,.jpeg,.png"
          max_mb: 10
          help_text: "Upload a PDF or image (max 10MB)."

    - title: "Additional Notes"
      fields:
        - key: notes
          label: "Anything else we should know?"
          type: textarea
          required: false

branding:
  logo_url: "/static/demo/riverside-mark.svg"
  theme:
    primary_color: "#2b6a72"
    accent_color: "#2b6a72"

success:
  title: "Submitted!"
  message: "Thanks — we received your enrollment request. We’ll follow up with next steps."
  response_time: "1–2 business days"
  next_steps:
    - "We’ll review your details and confirm program fit."
    - "If needed, we’ll schedule a quick call or trial class."
    - "We’ll send final enrollment + payment instructions."
  contact:
    name: "Front Desk"
    email: "info@example.com"
    phone: "(555) 123-4567"
  hours: "Mon–Fri, 9am–5pm"

  notifications:
    submission_email:
      to: ""
      cc: ""
      bcc: ""
      from_email: "noreply@enrollifyapp.com"
      subject: "New submission: {{student_name}}"

    applicant_confirmation:
      enabled: true
      from_email: "noreply@enrollifyapp.com"
      subject: "We received your application, {{student_name}}!"
      # message: ""   # optional — leave blank to use the default message

admin:
  submission_statuses:
    - New
    - In Review
    - Contacted
    - Needs Follow Up
    - Archived
    - Enrolled
    - Closed
  default_submission_status:
    - New
  lead_workflow:
    filters:
      new_leads:
        label: "New"
        statuses:
          - new
      pipeline:
        label: "In Pipeline"
        statuses:
          - contacted
          - trial_scheduled
      won:
        label: "Enrolled"
        statuses:
          - enrolled
    transitions:
      new:
        - label: "Mark Contacted"
          status: contacted
        - label: "Lost"
          status: lost
      contacted:
        - label: "Schedule Trial"
          status: trial_scheduled
        - label: "Lost"
          status: lost
      trial_scheduled:
        - label: "Lost"
          status: lost
      # enrolled is a terminal status set only by auto-conversion — no transitions from/to it


leads:
  form_title: "Request School Information"
  form_description: "Interested in our programs? Leave your details and a member of our team will reach out with enrollment information and next steps."
  cta_text: "Request Information"
  success_message: "Thanks for your interest! A member of our team will follow up within 1–2 business days."
  confirmation_enabled: true
  notify_to: ""

# Enrollment capacity limits (soft caps per program).
# Submissions are always accepted; families see a waitlist message when a program is full.
capacity:
  waitlist_message: "Our Beginner Program is currently full. You've been added to our waitlist — we'll contact you as spots open up."
  excluded_statuses:
    - Declined
    - Archived
  programs:
    beginner: 5        # low cap for easy demo testing
    intermediate: 20
    advanced: 10

# scheduling:
#   url: "https://calendly.com/your-school/30min"
#   label: "Book a free trial class"  # optional, defaults to "Book a time"

# Generic CSV export profiles.
# Each named profile adds an "Export → <Name> CSV" action to the admin Submissions list.
# New profile = add a block here. No code changes required.
#
# Field spec rules:
#   source: key          — looks up submission.data["key"]; missing → blank + warning
#   value: "literal"     — hardcoded string, never looked up
#   source_any: [k1, k2] — first key with a non-empty value wins; none found → blank + warning
exports:
  brightwheel:
    field_map:
      first_name:
        source: student_first_name
      last_name:
        source: student_last_name
      birthdate:
        source_any:           # tries each in order; first non-empty value wins
          - date_of_birth
          - dob
      homeroom:
        value: "Riverside Learning Academy"   # literal — written as-is regardless of submission data
      parent_email:
        source_any:
          - guardian_email
          - contact_email
      enrollment_status:
        value: "Applied"
