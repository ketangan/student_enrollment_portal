school:
  slug: "maplewood-learning"
  display_name: "Maplewood Learning Center"
  website_url: ""

# Three separate application forms for different programs.
# Each has its own URL: /schools/maplewood-learning/apply/?form_key=<key>
forms:
  general:
    title: "General Enrollment"
    description: >
      Apply for enrollment in our core academic program.
      A non-refundable $50 application fee is required to complete your application.

    form:
      sections:
        - title: "Student Information"
          fields:
            - key: student_first_name
              label: "Student First Name"
              type: text
              required: true

            - key: student_last_name
              label: "Student Last Name"
              type: text
              required: true

            - key: date_of_birth
              label: "Date of Birth"
              type: date
              required: true

            - key: grade_applying_for
              label: "Grade Applying For"
              type: select
              required: true
              options:
                - { value: "pre_k", label: "Pre-K" }
                - { value: "k",     label: "Kindergarten" }
                - { value: "1st",   label: "1st Grade" }
                - { value: "2nd",   label: "2nd Grade" }
                - { value: "3rd",   label: "3rd Grade" }
                - { value: "4th",   label: "4th Grade" }
                - { value: "5th",   label: "5th Grade" }

        - title: "Parent / Guardian Information"
          fields:
            - key: guardian_name
              label: "Parent / Guardian Full Name"
              type: text
              required: true

            - key: contact_email
              label: "Email Address"
              type: email
              required: true

            - key: contact_phone
              label: "Phone Number"
              type: tel
              required: true

        - title: "Additional Information"
          fields:
            - key: previous_school
              label: "Current / Previous School"
              type: text
              required: false

            - key: how_did_you_hear
              label: "How did you hear about us?"
              type: select
              required: false
              options:
                - { value: "google",   label: "Google / Search" }
                - { value: "referral", label: "Friend or Family Referral" }
                - { value: "social",   label: "Social Media" }
                - { value: "flyer",    label: "Flyer / Poster" }
                - { value: "other",    label: "Other" }

            - key: notes
              label: "Anything else we should know?"
              type: textarea
              required: false

  afterschool:
    title: "After School Program"
    description: >
      Apply for our After School Program, available Monday–Friday 3–6pm.
      A non-refundable $50 application fee is required to complete your application.

    form:
      sections:
        - title: "Student Information"
          fields:
            - key: student_first_name
              label: "Student First Name"
              type: text
              required: true

            - key: student_last_name
              label: "Student Last Name"
              type: text
              required: true

            - key: grade_applying_for
              label: "Current Grade"
              type: select
              required: true
              options:
                - { value: "k",   label: "Kindergarten" }
                - { value: "1st", label: "1st Grade" }
                - { value: "2nd", label: "2nd Grade" }
                - { value: "3rd", label: "3rd Grade" }
                - { value: "4th", label: "4th Grade" }
                - { value: "5th", label: "5th Grade" }

            - key: pickup_person
              label: "Authorized Pickup Person(s)"
              type: text
              required: true

        - title: "Schedule"
          fields:
            - key: attendance_days
              label: "Days Needed"
              type: multiselect
              required: true
              options:
                - { value: "mon", label: "Monday" }
                - { value: "tue", label: "Tuesday" }
                - { value: "wed", label: "Wednesday" }
                - { value: "thu", label: "Thursday" }
                - { value: "fri", label: "Friday" }

            - key: start_date
              label: "Requested Start Date"
              type: date
              required: false

        - title: "Parent / Guardian Information"
          fields:
            - key: guardian_name
              label: "Parent / Guardian Full Name"
              type: text
              required: true

            - key: contact_email
              label: "Email Address"
              type: email
              required: true

            - key: contact_phone
              label: "Phone Number"
              type: tel
              required: true

            - key: emergency_contact
              label: "Emergency Contact Name & Phone"
              type: text
              required: true

  scholarship:
    title: "Scholarship Application"
    description: >
      Apply for a need-based or merit-based scholarship at Maplewood Learning Center.
      The application fee is waived for scholarship applicants.

    form:
      sections:
        - title: "Student Information"
          fields:
            - key: student_first_name
              label: "Student First Name"
              type: text
              required: true

            - key: student_last_name
              label: "Student Last Name"
              type: text
              required: true

            - key: date_of_birth
              label: "Date of Birth"
              type: date
              required: true

            - key: grade_applying_for
              label: "Grade Applying For"
              type: select
              required: true
              options:
                - { value: "pre_k", label: "Pre-K" }
                - { value: "k",     label: "Kindergarten" }
                - { value: "1st",   label: "1st Grade" }
                - { value: "2nd",   label: "2nd Grade" }
                - { value: "3rd",   label: "3rd Grade" }
                - { value: "4th",   label: "4th Grade" }
                - { value: "5th",   label: "5th Grade" }

        - title: "Scholarship Type"
          fields:
            - key: scholarship_type
              label: "Scholarship Type"
              type: select
              required: true
              options:
                - { value: "need_based",  label: "Need-Based" }
                - { value: "merit_based", label: "Merit-Based" }
                - { value: "both",        label: "Both" }

            - key: statement
              label: "Tell us why you are applying for this scholarship"
              type: textarea
              required: true

        - title: "Parent / Guardian Information"
          fields:
            - key: guardian_name
              label: "Parent / Guardian Full Name"
              type: text
              required: true

            - key: contact_email
              label: "Email Address"
              type: email
              required: true

            - key: contact_phone
              label: "Phone Number"
              type: tel
              required: true

application_fee:
  enabled: true
  amount: 50
  description: "Non-refundable application fee"
  # The scholarship form waives the fee — handled by form_key check in the payment view.
  waived_for_forms:
    - scholarship

branding:
  theme:
    primary_color: "#166534"
    accent_color: "#15803d"

success:
  title: "Application Submitted!"
  message: >
    Thank you — your application to Maplewood Learning Center has been received.
    We will review it and be in touch within 5 business days.
  response_time: "5 business days"
  next_steps:
    - "Our admissions team will review your application."
    - "You'll receive an email with our decision or next steps."
    - "If accepted, we'll send enrollment paperwork and orientation details."
  contact:
    name: "Admissions Office"
    email: "admissions@maplewoodlearning.edu"
    phone: "(555) 400-1200"
  hours: "Mon–Fri, 8am–4pm"

  notifications:
    submission_email:
      to: "admissions@maplewoodlearning.edu"
      from_email: "noreply@enrollifyapp.com"
      subject: "New application: {{student_name}}"

    applicant_confirmation:
      enabled: true
      from_email: "noreply@enrollifyapp.com"
      subject: "We received your application — Maplewood Learning Center"

admin:
  submission_statuses:
    - New
    - Under Review
    - Interview Scheduled
    - Accepted
    - Waitlisted
    - Enrolled
    - Declined
  default_submission_status:
    - New
  lead_workflow:
    filters:
      new_leads:
        label: "New"
        statuses: [new]
      pipeline:
        label: "In Pipeline"
        statuses: [contacted, trial_scheduled]
      enrolled:
        label: "Enrolled"
        statuses: [enrolled]
    transitions:
      new:
        - { label: "Mark Contacted", status: contacted }
        - { label: "Lost", status: lost }
      contacted:
        - { label: "Lost", status: lost }

leads:
  success_message: "Thanks for your interest! We'll be in touch within 2 business days."
  cta_text: "Request Information"
