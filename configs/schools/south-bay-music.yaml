schema_version: "1.0"

school:
  slug: "south-bay-music"
  display_name: "South Bay Music Conservatory"
  website_url: "https://www.sbmusicconservatory.com/"
  source_url: "https://www.sbmusicconservatory.com/"

branding:
  custom_css: "schools/south-bay-music.css"

  theme:
    primary_color: "#15B0CC"
    accent_color: "#15B0CC"
    background: "#ffffff"
    card: "#ffffff"
    text: "#1A1A1A"
    muted: "#666666"
    border: "#e0e0e0"
    radius: "6px"
    font_family: "'Lato', Helvetica, Arial, sans-serif"
    heading_font: "'Playfair Display', Georgia, serif"

program_field_key: "instrument"

form:
  title: "Student Registration"
  submit_button_text: "Submit Registration"
  notice:
    text: "If you do not have a confirmed lesson time or need to change a previous time, please visit your"
    link_url: "/schools/south-bay-music/status/"
    link_text: "Application Status page"
    text_after: " to update your scheduling preferences."
    body: "This form can be updated as summer and fall scheduling becomes clear. We appreciate everyone's cooperation and flexibility with finding preferred lesson times. Thank you!"

  sections:

    - title: "Enrollment Type"
      fields:
        - key: lesson_time_status
          label: "Are you a new or returning student?"
          type: radio
          required: true
          options:
            - label: "New student"
              value: new_student
            - label: "Returning student"
              value: returning_student

    - title: "Student Information"
      fields:
        - key: student_last_name
          label: "Student Last Name"
          type: text
          required: true

        - key: student_first_name
          label: "Student First Name"
          type: text
          required: true

        - key: student_age
          label: "Student Age"
          type: text
          required: true

        - key: student_birthday
          label: "Student Birthday"
          type: date
          required: true

        - key: instrument
          label: "Instrument"
          type: select
          required: true

    - title: "Main Contact"
      fields:
        - key: preferred_communication
          label: "Preferred Communication Method"
          type: select
          required: true
          options:
            - label: "Text"
              value: text
            - label: "Email"
              value: email
            - label: "Call"
              value: call

        - key: main_contact_relationship
          label: "Relationship to Student"
          type: select
          required: true
          options:
            - label: "Mother"
              value: mother
            - label: "Father"
              value: father
            - label: "Guardian"
              value: guardian
            - label: "Self (adult student)"
              value: self
            - label: "Other"
              value: other

        - key: main_contact_last_name
          label: "Last Name"
          type: text
          required: true

        - key: main_contact_first_name
          label: "First Name"
          type: text
          required: true

        - key: guardian_email
          label: "Email"
          type: email
          required: true

        - key: guardian_phone
          label: "Phone Number"
          type: phone
          required: true

    - title: "Secondary Contact"
      fields:
        - key: secondary_contact_on_reminders
          label: "Add a secondary contact for reminders?"
          type: select
          required: true
          options:
            - label: "No"
              value: "no"
            - label: "Yes"
              value: "yes"
            - label: "Not applicable"
              value: not_applicable

        - key: secondary_contact_name
          label: "Secondary Contact Name"
          type: text
          required: false

        - key: secondary_contact_relationship
          label: "Relationship to Student"
          type: select
          required: false
          options:
            - label: "Mother"
              value: mother
            - label: "Father"
              value: father
            - label: "Guardian"
              value: guardian
            - label: "Self"
              value: self
            - label: "Other"
              value: other

        - key: secondary_contact_phone
          label: "Phone"
          type: phone
          required: false

        - key: secondary_contact_email
          label: "Email"
          type: email
          required: false

    - title: "Address"
      fields:
        - key: street_address
          label: "Street Address"
          type: text
          required: true

        - key: city
          label: "City"
          type: text
          required: true

        - key: zipcode
          label: "ZIP Code"
          type: text
          required: true

    - title: "School & Grade"
      fields:
        - key: student_school
          label: "Student's School Name"
          type: text
          required: true

        - key: grade_level
          label: "Grade Level"
          type: text
          required: true

    - title: "Additional Information"
      fields:
        - key: allergies
          label: "Allergies or Medical Conditions"
          type: textarea
          required: false

        - key: additional_info
          label: "Additional Information"
          type: textarea
          required: false

    - title: "Lesson Scheduling Preferences"
      description: "If you need a new time slot or are a new student, let us know your scheduling preferences below. We'll do our best to match your request."
      fields:
        - key: sched_day_preference
          label: "Weekday or Weekend? (check all that apply)"
          type: multiselect
          required: false
          options:
            - label: "Weekday"
              value: weekday
            - label: "Weekend"
              value: weekend

        - key: sched_preferred_timing
          label: "Preferred time of day"
          type: text
          required: false
          placeholder: "e.g. only after 5pm, mornings preferred"

        - key: sched_days_unavailable
          label: "Days that absolutely don't work"
          type: text
          required: false
          placeholder: "e.g. Monday mornings, all day Friday"

        - key: sched_preferred_slot
          label: "Ideal day and time (if you have one)"
          type: text
          required: false
          placeholder: "e.g. Tuesday 4pm"

        - key: sched_preferred_start_week
          label: "Preferred start week"
          type: date
          required: false

    - title: "Studio Policies & Enrollment Acknowledgment"
      fields:
        - key: studio_policies
          label: "Studio Policies"
          type: waiver
          text: "Please review the SBMC Studio Policies before completing your registration."
          link_url: "https://drive.google.com/file/d/148ZfUV16hg_vW7RfRfa2F5u7fmydR8Tx/view"
          link_text: "View Studio Policies HERE"
          checkbox_label: "I have reviewed the SBMC Studio Policies"
          required: false
          full_width: true

        - key: enrollment_fee_acknowledgment
          label: "Enrollment Fee Acknowledgment"
          type: auto_label
          required: true
          full_width: true
          source_field: lesson_time_status
          default_text: "Select your enrollment type above to see the applicable fee."
          options:
            - label: "I understand that enrollment includes a one-time Conservatory Assessment & Placement Fee (per student). This fee is non-refundable and non-transferable."
              value: new_student_fee
              source_value: new_student
              amount_display: "$125"
              amount_label: "Conservatory Assessment & Placement Fee"
              type_label: "New Student Fee"
            - label: "I understand that there is an annual Conservatory Registration Fee per family. This fee is non-refundable and non-transferable."
              value: returning_student_fee
              source_value: returning_student
              amount_display: "$75"
              amount_label: "Annual Conservatory Registration Fee"
              type_label: "Returning Student Fee"

        - key: monthly_tuition_policy
          label: "Monthly Tuition Policy"
          type: checkbox
          required: true
          full_width: true
          checkbox_label: "I understand that SBMC enrollment is ongoing and does not require re-enrollment each semester. The monthly tuition subscription will continue unless I notify SBMC to discontinue or pause lessons in accordance with studio policies."

        - key: makeups_cancellations
          label: "Makeups/Cancellations"
          type: checkbox
          required: true
          full_width: true
          checkbox_label: "I understand that tuition is billed monthly, reserves a weekly lesson time, and is not reduced or refunded for missed lessons. With advance notice (more than 24 hours), an asynchronous lesson will be provided via the Practice Space app."

        - key: media_release
          label: "Media Release and Use of Images"
          type: radio
          required: true
          full_width: true
          description: "SBMC may photograph or record students at lessons, recitals, and studio events for use on our website, social media, and promotional materials. Do you grant permission to use images or recordings of your child (or yourself, if an adult student)?"
          options:
            - label: "Yes, I grant permission"
              value: grant
            - label: "No, I do not grant permission"
              value: deny

        - key: final_agreement
          label: "Final Agreement"
          type: checkbox
          required: true
          full_width: true
          checkbox_label: "I have read and agree to abide by the SBMC Studio Policies and understand that continued enrollment constitutes agreement with current policies."

application_fee:
  enabled: true
  description: "Conservatory Registration Fee"
  amount_from_field:
    field: lesson_time_status
    amounts:
      new_student: 125
      returning_student: 75
    default: 125

success:
  title: "Registration Received!"
  message: >
    Thank you — we've received your registration for South Bay Music Conservatory.
    We'll be in touch within 1–2 business days to confirm your lesson schedule and next steps.
  response_time: "1–2 business days"
  next_steps:
    - "We'll review your registration and confirm your lesson schedule."
    - "Monthly tuition billing begins once enrollment is confirmed — no long-term commitment required."
  contact:
    name: "South Bay Music Conservatory"
    email: "info@sbmusicconservatory.com"
    phone: "424-399-5816"
  hours: "Text or call 424-399-5816 · info@sbmusicconservatory.com"
  hide_resubmit: true

  notifications:
    submission_email:
      to: "info@sbmusicconservatory.com"
      cc: ""
      bcc: ""
      from_email: "noreply@enrollifyapp.com"
      subject: "New registration: {{student_name}}"

    applicant_confirmation:
      enabled: true
      from_email: "noreply@enrollifyapp.com"
      subject: "We received your registration, {{student_name}}!"

admin:
  submission_statuses:
    - New
    - In Review
    - Enrolled
    - Waitlisted
    - Needs Follow Up
    - Declined
    - Archived
  default_submission_status: New

  submission_workflow:
    filters:
      new_registrations:
        label: "New"
        statuses: ["New"]
      in_review:
        label: "In Review"
        statuses: ["In Review", "Needs Follow Up"]
      enrolled:
        label: "Enrolled"
        statuses: ["Enrolled"]
      waitlisted:
        label: "Waitlisted"
        statuses: ["Waitlisted"]
      closed:
        label: "Closed"
        statuses: ["Declined", "Archived"]

    transitions:
      New:
        - label: "Mark Needs Follow Up"
          status: "Needs Follow Up"
        - label: "Archive"
          status: "Archived"
      In Review:
        - label: "Enroll"
          status: "Enrolled"
        - label: "Archive"
          status: "Archived"
      Needs Follow Up:
        - label: "Mark In Review"
          status: "In Review"
        - label: "Archive"
          status: "Archived"
      Waitlisted:
        - label: "Enroll"
          status: "Enrolled"
        - label: "Decline"
          status: "Declined"

  lead_workflow:
    filters:
      new_leads:
        label: "New"
        statuses: [new]
      pipeline:
        label: "In Pipeline"
        statuses: [contacted, trial_scheduled]
      won:
        label: "Enrolled"
        statuses: [enrolled]
    transitions:
      new:
        - label: "Mark Contacted"
          status: contacted
        - label: "Archive"
          status: lost
      contacted:
        - label: "Trial Scheduled"
          status: trial_scheduled
        - label: "Archive"
          status: lost
      trial_scheduled:
        - label: "Not Interested — Archive"
          status: lost

leads:
  form_title: "Book a Trial Lesson"
  form_description: >
    Fill out this quick form and we'll redirect you to schedule your 30-minute trial lesson ($30) on our booking system.
    A spot is not confirmed until you complete scheduling.
  cta_text: "Continue to Scheduling →"
  success_message: "Thanks! Redirecting you to schedule your trial lesson…"
  confirmation_enabled: true
  notify_to: "info@sbmusicconservatory.com"
  phone_required: true
  hide_program_field: true
  name_field_key: "student_name"
  redirect_url: "https://fons.app/@southbaymusicconservatory/book/appointments/fdbecaae-ae97-11f0-a3de-cfe489961f8c?staff="
  redirect_url_field: "instrument"
  redirect_url_map:
    piano: "https://fons.app/@southbaymusicconservatory/book/appointments/da4adf18-37fa-11f0-bba8-8b81bc8b90b7?staff="
    violin: "https://fons.app/@southbaymusicconservatory/book/appointments/a07707bc-3665-11f0-9e33-8f8cd70f9854?staff="
    viola: "https://fons.app/@southbaymusicconservatory/book/appointments/d553c0f2-4d84-11f0-b29b-ef5d2665792c?staff="
    cello: "https://fons.app/@southbaymusicconservatory/book/appointments/ea113b00-7c82-11f0-ac33-b7f9d14c4047?staff="

  fields:
    - key: student_name
      label: "Student Name"
      type: text
      required: true
      placeholder: "First and last name"

    - key: student_age
      label: "Student Age"
      type: text
      required: false
      placeholder: "e.g. 8"

    - key: instrument
      label: "Which instrument are you interested in?"
      type: select
      required: true
      options:
        - label: "Piano"
          value: piano
        - label: "Violin"
          value: violin
        - label: "Viola"
          value: viola
        - label: "Cello"
          value: cello

lead_forms:
  scheduling:
    form_title: "2026–27 Lesson Scheduling"
    form_description: >
      Help us find the right time slot for your student.
      We'll reach out to confirm — we can't hold spots more than 2 weeks out.
    cta_text: "Submit Preferences"
    success_message: "Got it — we'll be in touch to confirm your time slot."
    confirmation_enabled: true
    confirmation_subject: "We received your scheduling preferences — South Bay Music Conservatory"
    notify_to: "info@sbmusicconservatory.com"
    phone_required: true
    pipeline_visible: false
    category: "scheduling"

    fields:
      - key: student_name
        label: "Student Name"
        type: text
        required: true
        placeholder: "First and last name"

      - key: day_preference
        label: "Weekday or Weekend? (check all that apply)"
        type: multiselect
        required: true
        options:
          - label: "Weekday"
            value: weekday
          - label: "Weekend"
            value: weekend

      - key: preferred_timing
        label: "Preferred time of day"
        type: text
        required: false
        placeholder: "e.g. only after 5pm, mornings preferred"

      - key: days_unavailable
        label: "Days that absolutely don't work"
        type: text
        required: false
        placeholder: "e.g. Monday mornings, all day Friday"

      - key: preferred_slot
        label: "Ideal day and time (if you have one)"
        type: text
        required: false
        placeholder: "e.g. Tuesday 4pm"

      - key: preferred_start_week
        label: "Preferred start week"
        type: date
        required: false

capacity:
  waitlist_message: "This program currently has limited availability. You've been added to our waitlist and we'll be in touch as soon as a spot opens."
  excluded_statuses:
    - Archived
    - Declined
  programs:
    piano: 15
    violin: 15
    viola: 10
    cello: 10
